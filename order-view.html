<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Details · Gorgon Crafting</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a2e;
      color: #e0d9c8;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
    }

    /* ── Top bar ── */
    .topbar {
      background: #0f0f1e; border-bottom: 1px solid #2a2a4a;
      padding: 0.75rem 1.5rem; display: flex; align-items: center; gap: 1rem;
    }
    .topbar-title {
      font-size: 1rem; font-weight: 700; color: #c9a96e;
      letter-spacing: 0.06em; flex: 1; text-decoration: none;
    }
    .topbar-title span { color: #7a7a9a; font-weight: 400; }
    .auth-topbtn {
      background: #c9a96e; color: #0f0f1e; border: none; border-radius: 5px;
      padding: 0.4rem 0.9rem; font-size: 0.82rem; font-weight: 700;
      cursor: pointer; letter-spacing: 0.04em; transition: background 0.2s;
    }
    .auth-topbtn:hover { background: #e8c87a; }
    .auth-topbtn.secondary {
      background: transparent; color: #8a8aaa; border: 1px solid #3a3a5a;
    }
    .auth-topbtn.secondary:hover { color: #e0d9c8; border-color: #6a6a8a; }
    .user-chip {
      display: flex; align-items: center; gap: 0.5rem;
      font-size: 0.82rem; color: #c9a96e;
    }
    .user-chip .avatar {
      width: 26px; height: 26px; border-radius: 50%;
      background: #2a2a4a; display: flex; align-items: center;
      justify-content: center; font-size: 0.78rem; font-weight: 700;
      color: #c9a96e; flex-shrink: 0; overflow: hidden;
    }
    .user-chip .avatar img { width: 100%; height: 100%; object-fit: cover; }

    /* ── Status bar ── */
    .status-bar {
      background: #0f0f1e; border-bottom: 1px solid #2a2a4a;
      padding: 0.5rem 1.5rem; font-size: 0.82rem; min-height: 2rem;
    }
    .status-bar.loading { color: #7a7a9a; }
    .status-bar.error   { color: #cc7070; }

    .page-wrap { max-width: 760px; margin: 0 auto; padding: 2rem 1rem; }

    .back-link {
      display: inline-flex; align-items: center; gap: 0.4rem;
      color: #7a7a9a; font-size: 0.84rem; text-decoration: none;
      margin-bottom: 1.5rem;
    }
    .back-link:hover { color: #c9a96e; }

    /* ── Cards ── */
    .card {
      background: #16213e; border: 1px solid #2a2a4a;
      border-radius: 8px; padding: 1.5rem; margin-bottom: 1.25rem;
    }
    .card h2 {
      font-size: 0.78rem; font-weight: 700; letter-spacing: 0.1em;
      color: #5a5a7a; text-transform: uppercase; margin-bottom: 1rem;
    }

    /* ── Order header ── */
    .order-recipe { font-size: 1.4rem; font-weight: 700; color: #c9a96e; margin-bottom: 0.25rem; }
    .order-meta { display: flex; flex-wrap: wrap; gap: 0.75rem 1.5rem; margin-top: 0.75rem; }
    .order-meta-item { font-size: 0.84rem; color: #8a8aaa; }
    .order-meta-item strong { color: #e0d9c8; }

    /* ── Status badge ── */
    .badge {
      display: inline-block; padding: 0.2rem 0.55rem; border-radius: 4px;
      font-size: 0.74rem; font-weight: 700; letter-spacing: 0.05em; text-transform: capitalize;
    }
    .badge.pending     { background: #2a2a0a; color: #c9a96e; border: 1px solid #5a4a1a; }
    .badge.in_progress { background: #0a1a2a; color: #6a9aca; border: 1px solid #1a3a5a; }
    .badge.done        { background: #0a2a1a; color: #5a9a7a; border: 1px solid #1a4a2a; }
    .badge.cancelled   { background: #2a2a3a; color: #5a5a7a; border: 1px solid #3a3a5a; }

    /* ── Gems ── */
    .gem-row { display: flex; gap: 2rem; flex-wrap: wrap; }
    .gem-item { font-size: 0.88rem; }
    .gem-item .label { color: #5a5a7a; font-size: 0.76rem; margin-bottom: 0.2rem; }
    .gem-item .value { color: #c9a96e; font-weight: 600; }

    /* ── Ingredients table ── */
    .ing-table { width: 100%; border-collapse: collapse; font-size: 0.86rem; }
    .ing-table th {
      text-align: left; color: #5a5a7a; font-size: 0.74rem; letter-spacing: 0.07em;
      text-transform: uppercase; padding: 0 0 0.5rem; border-bottom: 1px solid #2a2a4a;
    }
    .ing-table th.right, .ing-table td.right { text-align: right; }
    .ing-table td { padding: 0.45rem 0; border-bottom: 1px solid #1a1a2e; color: #c8c8e8; }
    .ing-table tr:last-child td { border-bottom: none; }
    .price-val  { color: #c9a96e; }
    .price-none { color: #4a4a6a; }

    /* ── Totals ── */
    .totals-grid {
      display: grid; grid-template-columns: 1fr auto;
      gap: 0.4rem 1.5rem; font-size: 0.9rem; margin-top: 1rem;
    }
    .totals-grid .label  { color: #8a8aaa; }
    .totals-grid .amount { text-align: right; color: #c9a96e; font-variant-numeric: tabular-nums; }
    .totals-grid .total-row .label  { color: #e0d9c8; font-weight: 700; }
    .totals-grid .total-row .amount { font-weight: 700; font-size: 1rem; }
    .totals-divider { grid-column: 1/-1; border: none; border-top: 1px solid #2a2a4a; margin: 0.25rem 0; }

    /* ── Notes ── */
    .note-text {
      white-space: pre-wrap; line-height: 1.7; color: #c8c8e8;
      font-size: 0.9rem; background: #0f1a2e; border: 1px solid #2a2a4a;
      border-radius: 6px; padding: 0.9rem 1rem;
    }
    .note-empty { color: #4a4a6a; font-style: italic; font-size: 0.88rem; }

    /* ── Crafter actions ── */
    .action-row { display: flex; gap: 0.6rem; flex-wrap: wrap; }
    .act-btn {
      border: 1px solid currentColor; background: transparent;
      border-radius: 5px; padding: 0.45rem 1rem; font-size: 0.84rem;
      font-weight: 600; cursor: pointer; transition: background 0.15s, color 0.15s;
    }
    .act-btn.progress { color: #6a9aca; }
    .act-btn.progress:hover { background: #6a9aca; color: #0f0f1e; }
    .act-btn.done     { color: #5a9a7a; }
    .act-btn.done:hover { background: #5a9a7a; color: #0f0f1e; }
    .act-btn.delete   { color: #cc7070; }
    .act-btn.delete:hover { background: #cc7070; color: #0f0f1e; }

    /* ── Auth modal ── */
    .modal-backdrop {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.65); z-index: 500;
      align-items: center; justify-content: center;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: #16213e; border: 1px solid #2a2a4a;
      border-radius: 10px; padding: 2rem; width: 340px; max-width: 95vw;
      position: relative;
    }
    .modal h3 { color: #c9a96e; font-size: 1.1rem; margin-bottom: 1.25rem; }
    .modal-close {
      position: absolute; top: 0.75rem; right: 0.75rem;
      background: transparent; border: none; color: #5a5a7a;
      font-size: 1.1rem; cursor: pointer;
    }
    .modal-close:hover { color: #e0d9c8; }
    .modal-tabs { display: flex; margin-bottom: 1.25rem; gap: 0.5rem; }
    .modal-tab {
      flex: 1; padding: 0.5rem; background: transparent;
      border: 1px solid #2a2a4a; border-radius: 5px; color: #8a8aaa;
      cursor: pointer; font-size: 0.84rem;
    }
    .modal-tab.active { background: #2a2a4a; color: #c9a96e; }
    .modal label { display: block; color: #8a8aaa; font-size: 0.78rem; margin-bottom: 0.3rem; margin-top: 0.85rem; }
    .modal input {
      width: 100%; background: #0f0f1e; border: 1px solid #2a2a4a;
      border-radius: 5px; padding: 0.5rem 0.75rem; color: #e0d9c8; font-size: 0.88rem;
    }
    .modal input:focus { outline: none; border-color: #c9a96e; }
    .modal-submit {
      width: 100%; margin-top: 1.25rem; background: #c9a96e; color: #0f0f1e;
      border: none; border-radius: 5px; padding: 0.6rem; font-weight: 700;
      font-size: 0.9rem; cursor: pointer;
    }
    .modal-submit:hover { background: #e8c87a; }
    .modal-toggle { margin-top: 0.75rem; font-size: 0.8rem; color: #5a5a7a; text-align: center; }
    .modal-toggle a { color: #c9a96e; cursor: pointer; }
    .google-btn {
      width: 100%; background: #fff; color: #1a1a2e; border: none; border-radius: 5px;
      padding: 0.6rem; font-weight: 700; font-size: 0.9rem; cursor: pointer; margin-top: 0.5rem;
    }
    .google-btn:hover { background: #e8e8e8; }
    .modal-error { color: #cc7070; font-size: 0.8rem; margin-top: 0.5rem; text-align: center; }
  </style>
</head>
<body>

<div class="topbar">
  <a class="topbar-title" href="index.html">Gorgon Crafting <span>Tools</span></a>
  <div id="auth-area"></div>
</div>
<div class="status-bar loading" id="status-bar">Loading order…</div>

<div class="page-wrap" id="page-wrap" style="display:none;">
  <a class="back-link" id="back-link" href="index.html">← Back</a>

  <!-- Order header -->
  <div class="card" id="header-card">
    <h2>Order</h2>
    <div class="order-recipe" id="order-recipe"></div>
    <div class="order-meta" id="order-meta"></div>
  </div>

  <!-- Gems -->
  <div class="card" id="gems-card" style="display:none;">
    <h2>Gems</h2>
    <div class="gem-row" id="gems-body"></div>
  </div>

  <!-- Ingredients & Pricing -->
  <div class="card" id="pricing-card" style="display:none;">
    <h2>Ingredients &amp; Pricing</h2>
    <table class="ing-table">
      <thead>
        <tr>
          <th>Ingredient</th>
          <th class="right">Per Craft</th>
          <th class="right">Total Qty</th>
          <th class="right">Unit Price</th>
          <th class="right">Line Total</th>
        </tr>
      </thead>
      <tbody id="ing-body"></tbody>
    </table>
    <div class="totals-grid" id="totals-grid"></div>
  </div>

  <!-- Notes -->
  <div class="card">
    <h2>Notes</h2>
    <div id="note-body"></div>
  </div>

  <!-- Crafter actions -->
  <div class="card" id="actions-card" style="display:none;">
    <h2>Actions</h2>
    <div class="action-row" id="actions-body"></div>
  </div>
</div>

<!-- Auth modal -->
<div class="modal-backdrop" id="auth-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeAuthModal()">✕</button>
    <h3>Sign In</h3>
    <div class="modal-tabs">
      <button class="modal-tab active" id="tab-google" onclick="switchTab('google')">Google</button>
      <button class="modal-tab"        id="tab-email"  onclick="switchTab('email')">Email</button>
    </div>
    <div id="pane-google">
      <button class="google-btn" onclick="signInGoogle()">Sign in with Google</button>
    </div>
    <div id="pane-email" style="display:none;">
      <div id="auth-name-wrap" style="display:none;">
        <label>Display Name</label>
        <input type="text" id="auth-name" placeholder="Your name">
      </div>
      <label>Email</label>
      <input type="email" id="auth-email" placeholder="you@example.com">
      <label>Password</label>
      <input type="password" id="auth-password" placeholder="••••••••">
      <button class="modal-submit" id="email-submit" onclick="signInEmail()">Sign In</button>
      <div class="modal-toggle">
        <span id="toggle-text">Don't have an account?</span>
        <a onclick="toggleEmailMode()"> Register</a>
      </div>
    </div>
    <div class="modal-error" id="auth-error"></div>
  </div>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
'use strict';

function escHtml(s) {
  return String(s ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtC(n) {
  if (!Number.isFinite(n)) return '—';
  return '$' + Math.round(n).toLocaleString('en-US');
}

function setStatus(msg, type = 'loading') {
  const bar = document.getElementById('status-bar');
  bar.textContent = msg;
  bar.className = `status-bar ${type}`;
}

// ─── Firebase ─────────────────────────────────────────────────────────────────
let db, auth, currentUser = null;

function initFirebase() {
  if (!FIREBASE_CONFIG.apiKey || FIREBASE_CONFIG.apiKey.startsWith('REPLACE')) return false;
  firebase.initializeApp(FIREBASE_CONFIG);
  db   = firebase.firestore();
  auth = firebase.auth();
  auth.onAuthStateChanged(user => {
    currentUser = user;
    const area = document.getElementById('auth-area');
    if (user) {
      const inGameName  = localStorage.getItem('inGameName');
      const displayName = inGameName || user.displayName || user.email || '?';
      const initial     = displayName[0].toUpperCase();
      const photoHtml   = user.photoURL ? `<img src="${user.photoURL}" alt="">` : initial;
      area.innerHTML = `
        <div class="user-chip">
          <div class="avatar">${photoHtml}</div>
          <span>${escHtml(displayName)}</span>
          <button class="auth-topbtn secondary" onclick="doSignOut()">Sign Out</button>
        </div>`;
      closeAuthModal();
    } else {
      area.innerHTML = `<button class="auth-topbtn" onclick="openAuthModal()">Sign In</button>`;
    }
    loadOrder();
  });
  return true;
}

// ─── Order loading ─────────────────────────────────────────────────────────────
const params  = new URLSearchParams(location.search);
const orderId = params.get('order');

async function loadOrder() {
  if (!orderId) { setStatus('No order ID in URL.', 'error'); return; }
  if (!db)      { setStatus('Firebase not configured — see firebase-config.js', 'error'); return; }

  try {
    const doc = await db.collection('orders').doc(orderId).get();
    if (!doc.exists) { setStatus('Order not found.', 'error'); return; }

    const d = doc.data();

    // Auth gate
    if (!currentUser) {
      setStatus('Sign in to view this order.', 'error');
      openAuthModal();
      return;
    }
    const isCrafter  = currentUser.uid === d.crafterUid;
    const isCustomer = currentUser.uid === d.customerUid;
    if (!isCrafter && !isCustomer) {
      setStatus('You do not have permission to view this order.', 'error');
      return;
    }

    renderOrder(doc.id, d, isCrafter);
    setStatus('');
    document.getElementById('page-wrap').style.display = '';
    document.getElementById('status-bar').style.display = 'none';

    // Set back link
    document.getElementById('back-link').href = isCrafter ? 'craftingOrders.html' : 'index.html';

  } catch (e) {
    setStatus('Error loading order: ' + e.message, 'error');
  }
}

function renderOrder(id, d, isCrafter) {
  // Header
  document.getElementById('order-recipe').textContent = `${d.craftNum}× ${d.recipeName}`;
  const date = d.createdAt ? new Date(d.createdAt.toMillis()).toLocaleString() : '—';
  document.getElementById('order-meta').innerHTML = `
    <div class="order-meta-item">Customer <strong>${escHtml(d.customerName || '—')}</strong></div>
    <div class="order-meta-item">Crafter <strong>${escHtml(d.crafterName || '—')}</strong></div>
    <div class="order-meta-item">Date <strong>${escHtml(date)}</strong></div>
    <div class="order-meta-item">Status <span class="badge ${d.status}">${d.status.replace('_',' ')}</span></div>
    ${d.totalCost != null ? `<div class="order-meta-item">Total <strong style="color:#c9a96e">${fmtC(d.totalCost)}</strong></div>` : ''}
  `;

  // Gems
  const hasGems = d.primaryGem || d.auxGem;
  if (hasGems) {
    let html = '';
    if (d.primaryGem) html += `<div class="gem-item"><div class="label">Primary Gem</div><div class="value">${escHtml(d.primaryGem)}</div></div>`;
    if (d.auxGem)     html += `<div class="gem-item"><div class="label">Auxiliary Gem</div><div class="value">${escHtml(d.auxGem)}</div></div>`;
    document.getElementById('gems-body').innerHTML = html;
    document.getElementById('gems-card').style.display = '';
  }

  // Ingredients
  const ings = d.ingredients;
  if (ings && ings.length > 0) {
    const commissionPct = d.commissionPct ?? 50;
    let subtotal = 0;
    let anyPrice = false;

    const rows = ings.map(ing => {
      const hasPrice = ing.unitPrice != null;
      if (hasPrice) { subtotal += ing.lineTotal; anyPrice = true; }
      return `<tr>
        <td>${escHtml(ing.name)}</td>
        <td class="right">${ing.stackSize}</td>
        <td class="right">${ing.totalQty}</td>
        <td class="right ${hasPrice ? 'price-val' : 'price-none'}">${hasPrice ? fmtC(ing.unitPrice) : '—'}</td>
        <td class="right ${hasPrice ? 'price-val' : 'price-none'}">${hasPrice ? fmtC(ing.lineTotal) : '—'}</td>
      </tr>`;
    }).join('');
    document.getElementById('ing-body').innerHTML = rows;

    if (anyPrice) {
      const commission = subtotal * (commissionPct / 100);
      const total      = subtotal + commission;
      document.getElementById('totals-grid').innerHTML = `
        <span class="label">Material Subtotal</span><span class="amount">${fmtC(subtotal)}</span>
        <hr class="totals-divider">
        <span class="label">Commission (${commissionPct}%)</span><span class="amount">${fmtC(commission)}</span>
        <hr class="totals-divider">
        <span class="label total-row">Total</span><span class="amount total-row">${fmtC(total)}</span>
      `;
    }
    document.getElementById('pricing-card').style.display = '';
  }

  // Notes
  const noteEl = document.getElementById('note-body');
  if (d.note) {
    noteEl.innerHTML = `<div class="note-text">${escHtml(d.note)}</div>`;
  } else {
    noteEl.innerHTML = '<div class="note-empty">No notes on this order.</div>';
  }

  // Crafter actions
  if (isCrafter && d.status !== 'cancelled') {
    renderActions(id, d.status);
    document.getElementById('actions-card').style.display = '';
  }
}

function renderActions(id, status) {
  let html = '';
  if (status === 'pending')
    html += `<button class="act-btn progress" onclick="setOrderStatus('${id}','in_progress')">Mark In Progress</button>`;
  if (status === 'in_progress')
    html += `<button class="act-btn done" onclick="setOrderStatus('${id}','done')">Mark Done</button>`;
  html += `<button class="act-btn delete" onclick="deleteOrder('${id}')">Delete Order</button>`;
  document.getElementById('actions-body').innerHTML = html;
}

async function setOrderStatus(id, status) {
  try {
    await db.collection('orders').doc(id).update({
      status,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
    });
    renderActions(id, status);
    // Update badge in header
    document.querySelector('#order-meta .badge').className = `badge ${status}`;
    document.querySelector('#order-meta .badge').textContent = status.replace('_',' ');
  } catch (e) {
    alert('Could not update: ' + e.message);
  }
}

async function deleteOrder(id) {
  if (!confirm('Permanently delete this order? This cannot be undone.')) return;
  try {
    await db.collection('orders').doc(id).delete();
    location.href = 'craftingOrders.html';
  } catch (e) {
    alert('Could not delete: ' + e.message);
  }
}

// ─── Auth modal ───────────────────────────────────────────────────────────────
let emailMode = 'signin';

function openAuthModal()  { document.getElementById('auth-modal').classList.add('open'); }
function closeAuthModal() { document.getElementById('auth-modal').classList.remove('open'); }

function switchTab(tab) {
  document.getElementById('pane-google').style.display = tab === 'google' ? '' : 'none';
  document.getElementById('pane-email').style.display  = tab === 'email'  ? '' : 'none';
  document.getElementById('tab-google').classList.toggle('active', tab === 'google');
  document.getElementById('tab-email').classList.toggle('active',  tab === 'email');
}

function toggleEmailMode() {
  emailMode = emailMode === 'signin' ? 'register' : 'signin';
  document.getElementById('email-submit').textContent  = emailMode === 'register' ? 'Register' : 'Sign In';
  document.getElementById('toggle-text').textContent   = emailMode === 'register' ? 'Already have an account?' : "Don't have an account?";
  document.getElementById('auth-name-wrap').style.display = emailMode === 'register' ? '' : 'none';
}

async function signInGoogle() {
  try {
    await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
  } catch (e) {
    document.getElementById('auth-error').textContent = e.message;
  }
}

async function signInEmail() {
  const email    = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  try {
    if (emailMode === 'register') {
      const name = document.getElementById('auth-name').value.trim();
      const cred = await auth.createUserWithEmailAndPassword(email, password);
      if (name) await cred.user.updateProfile({ displayName: name });
    } else {
      await auth.signInWithEmailAndPassword(email, password);
    }
  } catch (e) {
    document.getElementById('auth-error').textContent = e.message;
  }
}

async function doSignOut() {
  await auth.signOut();
  location.reload();
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
if (!initFirebase()) {
  setStatus('Firebase not configured — see firebase-config.js', 'error');
}
</script>
</body>
</html>
