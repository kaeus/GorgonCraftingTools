<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Details - CraftingCorner</title>
  <style>
    body { visibility: hidden; background-color: #000; }
    #global-loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #000; z-index: 9999; }
  </style>
  <script type="module" src="./js/main.js"></script>
</head>
<body>

<!-- ── Global Loading Overlay ── -->
<div id="global-loading-overlay"></div>

<div class="topbar"></div>

<div class="page">
  <h1>Order Details</h1>
  <div id="status" class="status-bar loading">Loading order…</div>
  <div id="order-details" style="display:none;">
    <!-- Order details will be rendered here -->
  </div>
</div>

<div class="modal-backdrop" id="auth-modal" style="display:none;">
  <div class="modal">
    <button class="modal-close" data-action="close-auth">✕</button>
    <h3>Sign In</h3>
    <div id="pane-google">
      <button class="google-btn" data-action="sign-in-google">
        <svg class="google-icon" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/></svg>
        Continue with Google
      </button>
    </div>
  </div>
</div>

<div class="footer"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="/firebase-config.js"></script>

</body>
</html>
