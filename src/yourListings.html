<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Listings - CraftingCorner</title>
  <script type="module" src="./js/main.js"></script>
</head>
<body>

<!-- ── Sidebar (rendered by sidebar.js) ── -->
<div class="topbar"></div>

<div class="page">
  <h1>Your Listings</h1>
  <p class="subtitle">Create and manage your crafter listings</p>
  <div id="status" class="status-bar loading">Loading crafting interface…</div>
  <div id="crafting-area" style="display:none;">
    <!-- Crafting UI will be rendered here -->
  </div>
</div>

<!-- ── Listing Type Selection Modal ── -->
<div class="modal-backdrop" id="listing-type-modal">
  <div class="modal">
    <button class="modal-close" data-action="close-listing-type">✕</button>
    <h3>Create New Listing</h3>
    <p style="color:#a8a8a8; font-size:0.9rem; margin-bottom:1.5rem;">Choose what you want to list:</p>
    <div style="display:flex; flex-direction:column; gap:0.75rem;">
      <button class="action-btn" onclick="window.selectListingType('crafted')" style="text-align:left; padding:1rem;">
        <div style="font-weight:600;">Crafted Goods</div>
        <div style="font-size:0.8rem; color:#a8a8a8; margin-top:0.25rem;">Offer your services as a craftsperson</div>
      </button>
      <button class="action-btn" onclick="window.selectListingType('item')" style="text-align:left; padding:1rem;">
        <div style="font-weight:600;">Fence an Item</div>
        <div style="font-size:0.8rem; color:#a8a8a8; margin-top:0.25rem;">It's yours isn't it?</div>
      </button>
      <button class="action-btn" onclick="window.selectListingType('service')" style="text-align:left; padding:1rem;">
        <div style="font-weight:600;">Sell a Service</div>
        <div style="font-size:0.8rem; color:#a8a8a8; margin-top:0.25rem;">Offer your... services?</div>
      </button>
    </div>
  </div>
</div>

<!-- ── Service Listing Modal ── -->
<div class="modal-backdrop" id="service-listing-modal">
  <div class="modal">
    <button class="modal-close" data-action="close-service-listing">✕</button>
    <h3>Sell a Service</h3>
    <p style="color:#a8a8a8; font-size:0.9rem; margin-bottom:1rem;">Create a service listing to offer your expertise.</p>
    <div id="service-form-container">
      <!-- Form will be rendered here -->
    </div>
  </div>
</div>

<div class="modal-backdrop" id="auth-modal">
  <div class="modal">
    <button class="modal-close" data-action="close-auth">✕</button>
    <h3>Sign In to Manage Listings</h3>
    <div id="pane-google">
      <button class="google-btn" data-action="sign-in-google">
        <svg class="google-icon" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/></svg>
        Continue with Google
      </button>
    </div>
  </div>
</div>

<div class="footer"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="./firebase-config.js"></script>

</body>
</html>
