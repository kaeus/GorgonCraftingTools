<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - CraftingCorner</title>
  <script type="module" src="./js/main.js"></script>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">Gorgon Crafting <span>Admin</span></div>
  <div class="topbar-title">
    <img src="./images/crooked_coliseum_card.png" alt="Crooked Coliseum">
  </div>
  <div class="topbar-title">
    <img src="./images/artisan_alley.png" alt="Artisan Alley">
  </div>
  <div id="user-auth-slot">
    <button class="action-btn" data-action="open-auth">Sign In</button>
  </div>
</div>

<div id="gate">Checking admin access…</div>

<div id="admin-panel" style="display:none;">
  <div class="page">
    <h1>Admin Panel</h1>
    <p class="subtitle">View and manage all crafter listings</p>

    <div id="status" class="status-bar loading">Loading listings…</div>

    <div class="toolbar">
      <label for="status-filter">Show</label>
      <select id="status-filter">
        <option value="">All</option>
        <option value="active">Active only</option>
        <option value="inactive">Inactive only</option>
      </select>
      <div class="spacer"></div>
      <button class="refresh-btn" data-action="load-all-listings">↺ Refresh</button>
    </div>

    <div id="table-wrap">
      <div class="empty-state">Loading…</div>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="auth-modal">
  <div class="modal">
    <button class="modal-close" data-action="close-auth">✕</button>
    <h3>Admin Sign In</h3>
    <div id="pane-google">
      <button class="google-btn" data-action="sign-in-google">
        <svg class="google-icon" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/></svg>
        Continue with Google
      </button>
    </div>
  </div>
</div>

<div class="footer"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="./firebase-config.js"></script>

</body>
</html>
